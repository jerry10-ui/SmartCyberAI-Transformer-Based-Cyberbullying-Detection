<!DOCTYPE html>
<html>
<head>
    <title>Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            min-height: 100vh;
        }
        .card {
            border-radius: 15px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container d-flex justify-content-between">
        <span class="navbar-brand">Profile - {{ username }}</span>
        <div>
            <a href="/" class="btn btn-outline-light btn-sm">Home</a>
            <a href="/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
            <a href="/logout" class="btn btn-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-5 col-md-6">
    <div class="card p-4 shadow-lg bg-white">

        <h4 class="text-primary mb-3">Account Information</h4>

        <p><strong>Username:</strong> {{ username }}</p>
        <p><strong>Total Analyses Performed:</strong> {{ total_analyses }}</p>

        <hr>

    </div>
</div>

</body>
</html>
