<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #1e3a8a, #2563eb);
            min-height: 100vh;
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center">

<div class="card p-4 col-md-4 bg-white shadow-lg rounded-4">
    <h3 class="text-center text-primary">Create Account</h3>

    {% if error %}
        <div class="alert alert-danger">{{ error }}</div>
    {% endif %}
    {% if success %}
        <div class="alert alert-success">{{ success }}</div>
    {% endif %}

    <form method="POST">
        <input class="form-control mb-2" type="text" name="username" placeholder="Username" required>
        <input class="form-control mb-3" type="password" name="password" placeholder="Password" required>
        <button class="btn btn-success w-100">Register</button>
    </form>

    <hr>
    <a href="/login" class="btn btn-outline-primary w-100">Back to Login</a>
</div>

</body>
</html>
